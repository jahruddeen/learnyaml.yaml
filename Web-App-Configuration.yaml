# Below scenario -Block style enhances clarity and nesting hierarchy.
server:
  host: "localhost"
  port: 8080

# Below scenario - Indentation visually separates database properties and credentials
database: 
  type: postgres
  host: db.example.com
  port: 5432
  credentials:
    user: Utsav Singh
    password: 123@Utsav

# Below scenario - Lists (Like features) are s  hown line-by-line for readability.
feature: 
  - login 
  - signup
  - email-verification

#Note: Common for application configs, easy to manage and review  in DevOps Pipeline.

This style is perfect for scenarios where space efficiency matters. ​For example, when data is generated by machines, or when configuration needs to be embedded ​in line. ​However, this compactness comes with a trade-off. ​For humans, especially developers and DevOps engineers, flow style is much harder to read ​and edit manually, particularly when you're dealing with deeply nested structures like ​the credentials under the database. ​One missed comma or brace and it becomes a debugging headache. ​So while both styles are valid, YAML block style is often preferred for clarity, while ​flow style is useful when you need compactness or are dealing with automation. ​We hope this session helped you understand the real formatting example. 